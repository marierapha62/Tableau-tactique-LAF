<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="icon" href="logo-192.png" type="image/png">
  <link rel="apple-touch-icon" href="logo-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#fcd116">
  
  <title>Tableau Tactique Football - Multi-Équipes</title>
  <style>
    /* --- VARIABLES DE COULEURS --- */
    :root {
      --club-jaune: #fcd116; 
      --club-noir: #111111;  
      --club-gris: #222222;  
      --pitch-vert: #27ae60; 
      --pitch-lignes: rgba(255, 255, 255, 0.85); 
    }

    /* --- CSS GÉNÉRAL --- */
    body {
      font-family: Arial, sans-serif;
      display: flex; flex-direction: column; gap: 15px;
      padding: 10px; background-color: var(--club-noir);
      color: white; align-items: center; margin: 0;
    }

    .en-tete { display: flex; align-items: center; gap: 20px; padding-top: 10px; }
    
    /* LOGO EN-TÊTE */
    .conteneur-logo-entete {
      width: 70px; height: 70px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(252, 209, 22, 0.5);
      display: flex; justify-content: center; align-items: center;
      background-color: white;
    }
    
    .logo-club { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transform: scale(1.4); /* Zoom ajusté pour remplir le cercle */
    }

    h1 { margin: 0; font-size: 22px; color: var(--club-jaune); text-transform: uppercase; letter-spacing: 2px; text-align: center;}

    /* Panneaux */
    .panneau {
      display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;
      background-color: var(--club-gris); padding: 15px;
      border-radius: 8px; border: 1px solid #333; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      width: 100%; max-width: 900px; box-sizing: border-box;
    }

    .panneau h3 { margin: 0 0 10px 0; color: var(--club-jaune); font-size: 16px; width: 100%; text-align: center; border-bottom: 1px solid #444; padding-bottom: 5px; }

    input[type="text"], input[type="number"], select {
      padding: 8px; font-size: 14px; border-radius: 5px;
      background-color: #333; color: white; border: 1px solid var(--club-jaune);
    }
    
    select { font-weight: bold; }

    button {
      background-color: var(--club-jaune); color: var(--club-noir);
      border: none; padding: 8px 12px; font-size: 14px; font-weight: bold;
      border-radius: 5px; cursor: pointer; transition: 0.2s;
    }
    button:hover { background-color: #f39c12; transform: scale(1.05); }
    
    .btn-danger { background-color: #e74c3c; color: white; border: 1px solid #c0392b; }
    .btn-danger:hover { background-color: #c0392b; }
    .btn-success { background-color: #27ae60; color: white; border: 1px solid #2ecc71; }
    .btn-success:hover { background-color: #2ecc71; }
    .btn-bleu { background-color: #3498db; color: white; border: 1px solid #2980b9; }
    .btn-bleu:hover { background-color: #2980b9; }
    .btn-gris { background-color: #7f8c8d; color: white; border: 1px solid #95a5a6; }
    .btn-gris:hover { background-color: #95a5a6; }

    .interface { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 900px; }

    /* --- TERRAIN --- */
    #terrain {
      width: 400px; height: 600px; background-color: var(--pitch-vert);
      border: 3px solid white; border-radius: 5px; position: relative;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); overflow: hidden; touch-action: none; 
    }

    .filigrane-logo {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 250px; height: 250px; 
      background-image: url("logo-192.png"); 
      background-size: contain; background-repeat: no-repeat; background-position: center;
      opacity: 0.20; pointer-events: none; z-index: 0;
      mix-blend-mode: multiply; 
    }

    .marquages { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .marquages div { position: absolute; box-sizing: border-box; }
    .ligne-mediane { top: 50%; left: 0; width: 100%; height: 2px; background-color: var(--pitch-lignes); transform: translateY(-50%); }
    .cercle-central { top: 50%; left: 50%; width: 100px; height: 100px; border: 2px solid var(--pitch-lignes); border-radius: 50%; transform: translate(-50%, -50%); }
    .point-central { top: 50%; left: 50%; width: 6px; height: 6px; background-color: var(--pitch-lignes); border-radius: 50%; transform: translate(-50%, -50%); }
    .surface-reparation { width: 240px; height: 90px; border: 2px solid var(--pitch-lignes); left: 50%; transform: translateX(-50%); background-color: var(--pitch-vert); z-index: 3; }
    .surface-haut { top: 0; border-top: none; }
    .surface-bas { bottom: 0; border-bottom: none; }
    .surface-but { width: 100px; height: 30px; border: 2px solid var(--pitch-lignes); left: 50%; transform: translateX(-50%); }
    .surface-but-haut { top: 0; border-top: none; }
    .surface-but-bas { bottom: 0; border-bottom: none; }
    .point-penalty { width: 4px; height: 4px; background-color: var(--pitch-lignes); border-radius: 50%; left: 50%; transform: translateX(-50%); }
    .point-penalty-haut { top: 60px; }
    .point-penalty-bas { bottom: 60px; }
    .arc-surface { width: 80px; height: 80px; border: 2px solid var(--pitch-lignes); border-radius: 50%; left: 50%; transform: translateX(-50%); z-index: 2; }
    .arc-haut { top: 20px; }
    .arc-bas { bottom: 20px; }

    /* --- ZONES --- */
    .zone {
      width: 60px; height: 60px; position: absolute; transform: translate(-50%, -50%);
      border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      transition: top 0.4s ease, left 0.4s ease; z-index: 10; 
    }
    body.mode-edition .zone { border: 3px solid var(--club-jaune); background-color: rgba(252, 209, 22, 0.2); cursor: move; transition: none; }
    body.mode-edition .joueur { pointer-events: none; opacity: 0.5; }

    /* --- ADVERSAIRES --- */
    .adversaire {
      width: 45px; height: 45px;
      background-color: #e74c3c;
      color: white;
      border-radius: 50%;
      position: absolute;
      display: flex; justify-content: center; align-items: center;
      font-weight: bold; font-size: 16px;
      border: 2px solid white;
      cursor: grab;
      z-index: 15; 
      transform: translate(-50%, -50%);
      user-select: none;
      touch-action: none;
      transition: top 0.3s ease, left 0.3s ease;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
    }
    .adversaire.dragging { transition: none; z-index: 1000; cursor: grabbing; transform: translate(-50%, -50%) scale(1.15); }

    /* --- BANC ET JOUEURS --- */
    #banc {
      width: 300px; background-color: var(--club-gris); padding: 15px; border-radius: 8px;
      border: 1px solid #333; display: flex; flex-wrap: wrap; gap: 10px;
      align-content: flex-start; min-height: 500px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .joueur {
      width: 50px; height: 50px; background-color: var(--club-jaune); color: var(--club-noir);
      border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: grab; font-size: 10px; font-weight: bold; text-align: center;
      border: 2px solid var(--club-noir); user-select: none; transition: transform 0.1s;
      touch-action: none; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4); z-index: 20;
    }
    .joueur.gardien { background-color: var(--club-noir); color: var(--club-jaune); border-color: var(--club-jaune); }
    .joueur:active { cursor: grabbing; transform: scale(1.15); z-index: 1000; }
    .joueur .numero { font-size: 16px; font-weight: 900; }
    
    .groupe-form { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .section-admin { width: 100%; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px; }
    
    .separateur { width: 1px; background-color: #555; height: 30px; margin: 0 10px; display: inline-block; }
    @media (max-width: 600px) { .separateur { width: 100%; height: 1px; } }

  </style>
</head>

    let dictionnaireEquipes = JSON.parse(localStorage.getItem('mes_equipes_v2')) || equipesParDefaut;
    let equipeActiveNom = localStorage.getItem('equipe_active') || "U16";
    
    if (!dictionnaireEquipes[equipeActiveNom]) { equipeActiveNom = Object.keys(dictionnaireEquipes)[0]; }

    let schemasTactiques = JSON.parse(localStorage.getItem('mes_tactiques_v3')) || tactiquesParDefaut;
    let compoSauvegardees = {};

    const banc = document.getElementById('banc');
    const selectEquipe = document.getElementById('select-equipe');
    const selectFormation = document.getElementById('select-formation');
    const selectCompo = document.getElementById('select-compo');
    let joueurEnCoursDeDeplacement = null;

    /* VARIABLES ADVERSAIRE */
    const advContainer = document.getElementById('adversaires-container');
    const btnToggleAdv = document.getElementById('btn-toggle-adv');
    const selectFormationAdv = document.getElementById('select-formation-adv');
    let adversairesAffiches = false;

    /* ==========================================
       3. FONCTIONS D'INTERFACE ET DE MÉMOIRE
       ========================================== */
    
    function majMenuEquipes() {
      selectEquipe.innerHTML = '';
      for (const nom in dictionnaireEquipes) {
        const opt = document.createElement('option');
        opt.value = nom; opt.textContent = nom;
        selectEquipe.appendChild(opt);
      }
      selectEquipe.value = equipeActiveNom;
      document.getElementById('titre-admin').innerHTML = `⚙️ Outils pour : <b>${equipeActiveNom}</b>`;
    }

    function majMenuTactiques() {
      selectFormation.innerHTML = '';
      selectFormationAdv.innerHTML = '<option value="">-- Schéma Adverse --</option>';
      for (const nom in schemasTactiques) {
        const opt = document.createElement('option');
        opt.value = nom; opt.textContent = nom;
        selectFormation.appendChild(opt);

        const optAdv = document.createElement('option');
        optAdv.value = nom; optAdv.textContent = nom;
        selectFormationAdv.appendChild(optAdv);
      }
    }

    function majMenuCompos() {
      selectCompo.innerHTML = '<option value="">-- Choisir --</option>';
      compoSauvegardees = JSON.parse(localStorage.getItem(`mes_compos_${equipeActiveNom}`)) || {};
      for (const nom in compoSauvegardees) {
        const opt = document.createElement('option');
        opt.value = nom; opt.textContent = nom;
        selectCompo.appendChild(opt);
      }
    }

    function appliquerFormation(nomFormation) {
      const positions = schemasTactiques[nomFormation];
      if(!positions) return;
      positions.forEach((pos, index) => {
        const zone = document.getElementById(`zone-${index}`);
        if (zone) { zone.style.top = pos.top + '%'; zone.style.left = pos.left + '%'; }
      });
      localStorage.setItem('tactique_formation_active', nomFormation);
    }

    /* GESTION DE L'ÉQUIPE ADVERSE */
    function initAdversaires() {
      advContainer.innerHTML = '';
      for(let i=0; i<11; i++) {
        const adv = document.createElement('div');
        adv.className = 'adversaire';
        adv.textContent = i === 0 ? 'GK' : (i + 1);
        advContainer.appendChild(adv);
      }
    }

    function appliquerFormationAdverse(nomFormation) {
      const positions = schemasTactiques[nomFormation];
      if(!positions) return;
      const advs = advContainer.querySelectorAll('.adversaire');
      positions.forEach((pos, index) => {
        if(advs[index]) {
          advs[index].style.top = (100 - pos.top) + '%';
          advs[index].style.left = (100 - pos.left) + '%';
        }
      });
      sauvegarderPlacementSession();
    }

    btnToggleAdv.addEventListener('click', () => {
      adversairesAffiches = !adversairesAffiches;
      if (adversairesAffiches) {
        advContainer.style.display = 'block';
        selectFormationAdv.style.display = 'inline-block';
        btnToggleAdv.textContent = 'Masquer l\'adversaire';
        btnToggleAdv.classList.replace('btn-danger', 'btn-gris');
        
        if (selectFormationAdv.value === "") {
           selectFormationAdv.value = "11v11: 4-3-3 (Classique)";
           appliquerFormationAdverse("11v11: 4-3-3 (Classique)");
        }
      } else {
        advContainer.style.display = 'none';
        selectFormationAdv.style.display = 'none';
        btnToggleAdv.textContent = 'Afficher l\'équipe adverse';
        btnToggleAdv.classList.replace('btn-gris', 'btn-danger');
      }
      sauvegarderPlacementSession();
    });

    selectFormationAdv.addEventListener('change', (e) => {
      appliquerFormationAdverse(e.target.value);
    });

    /* GESTION DES JOUEURS */
    function creerElementJoueur(donneesJoueur) {
      const divJoueur = document.createElement('div');
      divJoueur.className = 'joueur';
      if (donneesJoueur.isGk) divJoueur.classList.add('gardien');
      
      divJoueur.draggable = true; divJoueur.id = donneesJoueur.id;
      divJoueur.innerHTML = `<span class="numero">${donneesJoueur.numero}</span><span class="nom">${donneesJoueur.nom}</span>`;

      divJoueur.addEventListener('dragstart', function() { joueurEnCoursDeDeplacement = this; setTimeout(() => this.style.opacity = '0.5', 0); });
      divJoueur.addEventListener('dragend', function() { setTimeout(() => this.style.opacity = '1', 0); joueurEnCoursDeDeplacement = null; });

      divJoueur.addEventListener('touchstart', function(e) {
        joueurEnCoursDeDeplacement = this; e.preventDefault(); 
        this.style.opacity = '0.8'; this.style.position = 'fixed'; this.style.zIndex = '1000';
      }, { passive: false });

      divJoueur.addEventListener('touchmove', function(e) {
        if (!joueurEnCoursDeDeplacement) return; e.preventDefault();
        const touch = e.touches[0];
        this.style.left = touch.clientX - 25 + 'px'; this.style.top = touch.clientY - 25 + 'px';
      }, { passive: false });

      divJoueur.addEventListener('touchend', function(e) {
        if (!joueurEnCoursDeDeplacement) return;
        const touch = e.changedTouches[0];
        this.style.display = 'none';
        let elementCible = document.elementFromPoint(touch.clientX, touch.clientY);
        this.style.display = 'flex';

        this.style.position = ''; this.style.zIndex = '20'; this.style.left = ''; this.style.top = ''; this.style.opacity = '1';

        if (elementCible) {
          if (elementCible.closest('.joueur')) { elementCible = elementCible.closest('.joueur').parentNode; }
          validerDepot(elementCible);
        }
        joueurEnCoursDeDeplacement = null;
      });
      return divJoueur;
    }

    function validerDepot(cible) {
      if (cible.id === 'banc') { cible.appendChild(joueurEnCoursDeDeplacement); } 
      else if (cible.classList.contains('zone')) {
        const joueursDansZone = cible.querySelectorAll('.joueur');
        if (joueursDansZone.length > 0) {
          const joueurAInverser = joueursDansZone[0];
          const zoneDeDepart = joueurEnCoursDeDeplacement.parentNode;
          zoneDeDepart.appendChild(joueurAInverser);
          cible.appendChild(joueurEnCoursDeDeplacement);
        } else { cible.appendChild(joueurEnCoursDeDeplacement); }
      }
      sauvegarderPlacementSession();
    }

    document.querySelectorAll('.zone').forEach(zone => {
      zone.addEventListener('dragover', e => e.preventDefault());
      zone.addEventListener('drop', function(e) {
        e.preventDefault(); if (!joueurEnCoursDeDeplacement) return;
        let cible = this; if (this.classList.contains('joueur')) cible = this.parentNode;
        validerDepot(cible);
      });
    });

    function sauvegarderPlacementSession() {
      const configuration = {};
      document.querySelectorAll('.zone').forEach(zone => {
        const joueurs = zone.querySelectorAll('.joueur');
        configuration[zone.id] = Array.from(joueurs).map(j => j.id);
      });

      const advPositions = [];
      document.querySelectorAll('.adversaire').forEach(adv => {
        advPositions.push({ top: adv.style.top, left: adv.style.left });
      });

      localStorage.setItem(`placement_session_${equipeActiveNom}`, JSON.stringify(configuration));
      localStorage.setItem(`placement_session_adv_${equipeActiveNom}`, JSON.stringify({ 
         affiches: adversairesAffiches, 
         formation: selectFormationAdv.value,
         positions: advPositions 
      }));
    }

    /* ==========================================
       4. CHANGEMENT D'ÉQUIPE ET CHARGEMENT
       ========================================== */
    
    function chargerEnvironnementEquipe() {
      majMenuEquipes();
      majMenuCompos(); 

      document.querySelectorAll('.joueur').forEach(j => j.remove());

      const effectifActif = dictionnaireEquipes[equipeActiveNom];
      effectifActif.forEach(donneesJoueur => banc.appendChild(creerElementJoueur(donneesJoueur)));

      const sauvegarde = JSON.parse(localStorage.getItem(`placement_session_${equipeActiveNom}`));
      if (sauvegarde) {
        for (const zoneId in sauvegarde) {
          const zone = document.getElementById(zoneId);
          if (zone) {
            sauvegarde[zoneId].forEach(joueurId => {
              const joueur = document.getElementById(joueurId);
              if (joueur) zone.appendChild(joueur);
            });
          }
        }
      }

      const advData = JSON.parse(localStorage.getItem(`placement_session_adv_${equipeActiveNom}`));
      if (advData && advData.affiches) {
         adversairesAffiches = true;
         advContainer.style.display = 'block';
         selectFormationAdv.style.display = 'inline-block';
         btnToggleAdv.textContent = 'Masquer l\'adversaire';
         btnToggleAdv.classList.replace('btn-danger', 'btn-gris');
         selectFormationAdv.value = advData.formation;
         
         const advs = document.querySelectorAll('.adversaire');
         advData.positions.forEach((pos, i) => {
           if (advs[i]) { advs[i].style.top = pos.top; advs[i].style.left = pos.left; }
         });
      } else {
         adversairesAffiches = false;
         advContainer.style.display = 'none';
         selectFormationAdv.style.display = 'none';
         btnToggleAdv.textContent = 'Afficher l\'équipe adverse';
         btnToggleAdv.classList.replace('btn-gris', 'btn-danger');
      }
    }

    selectEquipe.addEventListener('change', (e) => {
      equipeActiveNom = e.target.value;
      localStorage.setItem('equipe_active', equipeActiveNom);
      chargerEnvironnementEquipe();
    });

    document.getElementById('btn-create-equipe').addEventListener('click', () => {
      const nomNouvelleEquipe = prompt("Nom de la nouvelle équipe (ex: U14, U10...) :");
      if (nomNouvelleEquipe && nomNouvelleEquipe.trim() !== "") {
        if (!dictionnaireEquipes[nomNouvelleEquipe]) {
          dictionnaireEquipes[nomNouvelleEquipe] = [];
          localStorage.setItem('mes_equipes_v2', JSON.stringify(dictionnaireEquipes));
          
          equipeActiveNom = nomNouvelleEquipe;
          localStorage.setItem('equipe_active', equipeActiveNom);
          chargerEnvironnementEquipe();
        } else {
          alert("Ce nom d'équipe existe déjà.");
        }
      }
    });

    selectFormation.addEventListener('change', (e) => appliquerFormation(e.target.value));

    document.getElementById('btn-reset').addEventListener('click', () => {
      document.querySelectorAll('.joueur').forEach(joueur => banc.appendChild(joueur));
      localStorage.removeItem(`placement_session_${equipeActiveNom}`);
    });

    /* ==========================================
       5. LOGIQUE D'ADMINISTRATION
       ========================================== */

    document.getElementById('btn-save-compo').addEventListener('click', () => {
      const nomCompo = document.getElementById('nom-nouvelle-compo').value.trim();
      if (!nomCompo) return alert("Veuillez donner un nom à cette composition.");

      const configuration = {};
      document.querySelectorAll('.zone').forEach(zone => {
        const joueurs = zone.querySelectorAll('.joueur');
        configuration[zone.id] = Array.from(joueurs).map(j => j.id);
      });

      compoSauvegardees[nomCompo] = configuration;
      localStorage.setItem(`mes_compos_${equipeActiveNom}`, JSON.stringify(compoSauvegardees));
      
      majMenuCompos();
      selectCompo.value = nomCompo;
      document.getElementById('nom-nouvelle-compo').value = '';
    });

    document.getElementById('btn-load-compo').addEventListener('click', () => {
      const nomCompo = selectCompo.value;
      if (!nomCompo || !compoSauvegardees[nomCompo]) return;

      document.querySelectorAll('.joueur').forEach(joueur => banc.appendChild(joueur));
      const configuration = compoSauvegardees[nomCompo];
      for (const zoneId in configuration) {
        const zone = document.getElementById(zoneId);
        if (zone) {
          configuration[zoneId].forEach(joueurId => {
            const joueur = document.getElementById(joueurId);
            if (joueur) zone.appendChild(joueur);
          });
        }
      }
      sauvegarderPlacementSession(); 
    });

    document.getElementById('btn-delete-compo').addEventListener('click', () => {
      const nomCompo = selectCompo.value;
      if (!nomCompo) return;
      if (confirm(`Supprimer la composition "${nomCompo}" ?`)) {
        delete compoSauvegardees[nomCompo];
        localStorage.setItem(`mes_compos_${equipeActiveNom}`, JSON.stringify(compoSauvegardees));
        majMenuCompos();
      }
    });

    document.getElementById('form-ajout-joueur').addEventListener('submit', function(e) {
      e.preventDefault();
      const nom = document.getElementById('new-nom').value;
      const num = document.getElementById('new-num').value;
      const isGk = document.getElementById('new-gk').checked;
      
      const nouveauJoueur = { id: 'j_perso_' + Date.now(), nom: nom, numero: num, isGk: isGk };
      
      dictionnaireEquipes[equipeActiveNom].push(nouveauJoueur);
      localStorage.setItem('mes_equipes_v2', JSON.stringify(dictionnaireEquipes));
      
      banc.appendChild(creerElementJoueur(nouveauJoueur));
      this.reset();
    });

    let isModeEdition = false;
    let elementLibre = null; 
    const btnToggleEdition = document.getElementById('btn-toggle-edition');
    const groupeSauvegarde = document.getElementById('groupe-sauvegarde-tactique');

    btnToggleEdition.addEventListener('click', () => {
      isModeEdition = !isModeEdition;
      document.body.classList.toggle('mode-edition', isModeEdition);
      if (isModeEdition) {
        btnToggleEdition.textContent = "❌ Annuler l'édition"; btnToggleEdition.style.backgroundColor = "#e74c3c"; groupeSauvegarde.style.display = "flex";
      } else {
        btnToggleEdition.textContent = "1. Déverrouiller mon équipe"; btnToggleEdition.style.backgroundColor = "var(--club-jaune)"; groupeSauvegarde.style.display = "none";
      }
    });

    function demarrerDeplacementLibre(e) {
      const touch = e.type.includes('touch') ? e.touches[0] : e;
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      
      if (isModeEdition && target && target.classList.contains('zone')) { 
        elementLibre = target; 
        e.preventDefault(); 
      }
      else if (target && target.classList.contains('adversaire')) {
        elementLibre = target;
        elementLibre.classList.add('dragging');
        e.preventDefault();
      }
    }

    function glisserElementLibre(e) {
      if (!elementLibre) return; e.preventDefault();
      const touch = e.type.includes('touch') ? e.touches[0] : e;
      const rect = document.getElementById('terrain').getBoundingClientRect();
      let x = Math.max(0, Math.min(touch.clientX - rect.left, rect.width));
      let y = Math.max(0, Math.min(touch.clientY - rect.top, rect.height));
      elementLibre.style.left = (x / rect.width * 100) + '%';
      elementLibre.style.top = (y / rect.height * 100) + '%';
    }

    function arreterDeplacementLibre() { 
      if(elementLibre) {
        elementLibre.classList.remove('dragging');
        elementLibre = null; 
        sauvegarderPlacementSession(); 
      }
    }

    document.getElementById('terrain').addEventListener('mousedown', demarrerDeplacementLibre);
    document.getElementById('terrain').addEventListener('touchstart', demarrerDeplacementLibre, {passive: false});
    document.addEventListener('mousemove', glisserElementLibre);
    document.addEventListener('touchmove', glisserElementLibre, {passive: false});
    document.addEventListener('mouseup', arreterDeplacementLibre);
    document.addEventListener('touchend', arreterDeplacementLibre);

    document.getElementById('btn-save-tactique').addEventListener('click', () => {
      const nomTactique = document.getElementById('nom-nouvelle-tactique').value.trim();
      if (!nomTactique) return;
      const nouvellesPositions = [];
      for(let i=0; i<11; i++) {
        const z = document.getElementById('zone-'+i);
        nouvellesPositions.push({ top: parseFloat(z.style.top), left: parseFloat(z.style.left) });
      }
      schemasTactiques[nomTactique] = nouvellesPositions;
      localStorage.setItem('mes_tactiques_v3', JSON.stringify(schemasTactiques));
      majMenuTactiques(); selectFormation.value = nomTactique;
      localStorage.setItem('tactique_formation_active', nomTactique);
      btnToggleEdition.click(); document.getElementById('nom-nouvelle-tactique').value = '';
    });

    document.getElementById('btn-hard-reset').addEventListener('click', () => {
      if(confirm("⚠️ ACTION IRRÉVERSIBLE !\n\nCeci effacera toutes vos équipes, joueurs et tactiques créées. L'application redeviendra comme au premier jour.\n\nContinuer ?")) {
        localStorage.clear(); location.reload();
      }
    });

    /* --- DÉMARRAGE GLOBAL --- */
    initAdversaires();
    majMenuTactiques();
    const formationActive = localStorage.getItem('tactique_formation_active') || Object.keys(schemasTactiques)[0];
    selectFormation.value = formationActive;
    appliquerFormation(formationActive);
    
    chargerEnvironnementEquipe();

  </script>
</body>
</html>
